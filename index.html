<!DOCTYPE html>
<html>
<head>

<title>Frame Handling Example</title>

<style>

body{
    background: linear-gradient(to right,#1f4037,#99f2c8);
    font-family: Arial;
    text-align:center;
}

h2{
    color:white;
}

.container{
    margin-top:40px;
}

iframe{
    border:4px solid white;
    border-radius:10px;
    box-shadow:0px 0px 15px black;
}

</style>

</head>

<body>

<h2>Main Page (Parent Page)</h2>

<div class="container">

<iframe id="loginFrame" name="loginFrame" width="420" height="260"></iframe>

</div>

<script>

document.getElementById("loginFrame").srcdoc = `

<html>

<head>

<style>

body{
background:linear-gradient(to right,#ff9966,#ff5e62);
font-family:Arial;
text-align:center;
padding-top:30px;
}

h3{
color:white;
}

input{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#2c3e50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#34495e;
}

</style>

</head>

<body>

<h3>Login Form (Inside Frame)</h3>

Username <br>
<input type='text' id='username'><br>

Password <br>
<input type='password' id='password'><br><br>

<button onclick="alert('Login Successful')">Login</button>

</body>

</html>

`;

</script>

</body>
</html>
